<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POND — everyone is here</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="pond"></canvas>

<div id="toolbar">
  <div class="tool-group" id="tools">
    <button class="tool-btn active" data-tool="wave" title="Create wave">�</button>
    <button class="tool-btn" data-tool="fish" title="Spawn fish">🐟</button>
    <button class="tool-btn" data-tool="frog" title="Spawn frog">🐸</button>
    <button class="tool-btn" data-tool="dragonfly" title="Spawn dragonfly">🦟</button>
    <button class="tool-btn" data-tool="lily" title="Plant lily pad">🌿</button>
  </div>
</div>

<div id="cooldown-bar">
  <div id="cooldown-fill"></div>
</div>

<div id="event-banner"></div>
<div id="wave-pool-banner">WAVE POOL</div>

<div id="feed"></div>

<div id="respawn-banner">Your fish is gone — click any fish to return to the pond</div>

<div id="user-panel">
  <div id="user-panel-header">
    <span> Pond dwellers</span>
    <button id="user-panel-close">x</button>
  </div>
  <div id="user-list"></div>
</div>

<div id="status-bar">
  <span id="online-count">connecting...</span>
  <span id="my-name"></span>
  <span id="hint">click to make waves - spawn life</span>
</div>

<script src="pond.js"></script>
</body>
</html>
